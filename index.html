<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💩 完整版</title>
<style>
  body {
    margin: 0; height: 100vh; display: flex;
    justify-content: center; align-items: center;
    background: radial-gradient(ellipse at 50% 60%, #f5e6d0 0%, #d4b896 100%);
    overflow: hidden;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ========== 屎的分段参数 ==========
function getSegments() {
  return [
    [0,   75,  48, 35,  0.05],
    [-5,  40,  44, 32, -0.03],
    [3,   12,  40, 30,  0.02],
    [-2, -15,  36, 28, -0.04],
    [4,  -40,  32, 25,  0.03],
    [-1, -62,  26, 22, -0.02],
    [2,  -82,  20, 18,  0.04],
    [0,  -98,  13, 14,  0],
    [1, -110,   7,  9,  0.01],
    [-2,-135,   4,  6, -0.1],
    [1, -152,   2,  4,  0.15],
  ];
}

function outlinePath(ctx, segs, s, offX, offY) {
  const left = [], right = [];
  for (const [cx, cy, rx, ry, rot] of segs) {
    const x = cx * s + offX, y = cy * s + offY;
    const cos = Math.cos(rot), sin = Math.sin(rot);
    left.push({ x: x - cos * rx * s, y: y - sin * rx * s });
    right.push({ x: x + cos * rx * s, y: y + sin * rx * s });
  }
  const n = left.length;
  ctx.beginPath();
  ctx.moveTo(left[0].x, left[0].y);
  for (let i = 1; i < n; i++) {
    ctx.quadraticCurveTo(left[i-1].x, (left[i-1].y + left[i].y) / 2, left[i].x, left[i].y);
  }
  ctx.quadraticCurveTo((left[n-1].x + right[n-1].x) / 2, left[n-1].y - 12 * s, right[n-1].x, right[n-1].y);
  for (let i = n - 2; i >= 0; i--) {
    ctx.quadraticCurveTo(right[i+1].x, (right[i+1].y + right[i].y) / 2, right[i].x, right[i].y);
  }
  ctx.quadraticCurveTo((left[0].x + right[0].x) / 2, left[0].y + 18 * s, right[0].x, right[0].y);
  ctx.closePath();
}

// ========== 苍蝇类 ==========
class Fly {
  constructor(cx, cy, s) {
    this.baseX = cx;
    this.baseY = cy;
    this.s = s;
    this.reset();
  }
  reset() {
    // 在屎周围随机位置
    this.x = this.baseX + (Math.random() - 0.5) * 160 * this.s;
    this.y = this.baseY - 40 * this.s + (Math.random() - 0.5) * 220 * this.s;
    // 飞行速度
    const speed = 0.6 + Math.random() * 1.0;
    const dir = Math.random() * Math.PI * 2;
    this.vx = Math.cos(dir) * speed;
    this.vy = Math.sin(dir) * speed;
    this.wingPhase = Math.random() * Math.PI * 2;
    this.targetTimer = 60 + Math.random() * 120;
    this.landed = false;
    this.landTimer = 0;
    this.landX = 0;
    this.landY = 0;
    this.trail = [];
  }
  update(t) {
    // 添加拖尾
    this.trail.push({ x: this.x, y: this.y, life: 1 });
    if (this.trail.length > 10) this.trail.shift();
    for (const pt of this.trail) pt.life -= 0.1;

    if (this.landed) {
      this.landTimer--;
      // 停在屎表面
      const segs = getSegments();
      const idx = Math.floor(Math.random() * 6 + 2);
      const seg = segs[idx];
      const a = Math.random() * Math.PI * 2;
      const r = (seg[2] * this.s) * (0.6 + Math.random() * 0.4);
      this.x = this.baseX + seg[0] * this.s + Math.cos(a) * r;
      this.y = this.baseY + seg[1] * this.s + Math.sin(a) * r * 0.7;
      this.wingPhase += 0.02; // 慢速扇翅
      if (this.landTimer <= 0) {
        this.landed = false;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = -(1 + Math.random() * 1.5);
        this.targetTimer = 90 + Math.random() * 150;
      }
    } else {
      this.wingPhase += 0.3;
      // 随机转向
      this.targetTimer--;
      if (this.targetTimer <= 0) {
        // 偶尔停在屎上
        if (Math.random() < 0.35) {
          this.landed = true;
          this.landTimer = 40 + Math.random() * 100;
        } else {
          this.vx = (Math.random() - 0.5) * 2;
          this.vy = (Math.random() - 0.5) * 2;
          this.targetTimer = 60 + Math.random() * 150;
        }
      }
      // 保持在一定范围内
      const dx = this.x - this.baseX;
      const dy = this.y - (this.baseY - 60 * this.s);
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 150 * this.s) {
        this.vx -= dx / dist * 0.03;
        this.vy -= dy / dist * 0.03;
      }
    }
    if (!this.landed) {
      this.x += this.vx * this.s;
      this.y += this.vy * this.s;
    }
  }
  draw() {
    // 拖尾
    for (const pt of this.trail) {
      if (pt.life <= 0) continue;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, 1.2 * this.s, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(50,50,50,${pt.life * 0.12})`;
      ctx.fill();
    }
    ctx.save();
    ctx.translate(this.x, this.y);

    // 翅膀 — 快速扇动
    const wf = Math.abs(Math.sin(this.wingPhase));
    const wingLen = 5 * this.s;

    // 左翅
    ctx.save();
    ctx.rotate(-0.5 - wf * 1.2);
    ctx.beginPath();
    ctx.ellipse(-2 * this.s, 0, wingLen, 1.8 * this.s, 0.4, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,210,225,${0.3 + wf * 0.3})`;
    ctx.fill();
    ctx.restore();

    // 右翅
    ctx.save();
    ctx.rotate(0.5 + wf * 1.2);
    ctx.beginPath();
    ctx.ellipse(2 * this.s, 0, wingLen, 1.8 * this.s, -0.4, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,210,225,${0.3 + wf * 0.3})`;
    ctx.fill();
    ctx.restore();

    // 身体
    ctx.beginPath();
    ctx.ellipse(0, 0, 3 * this.s, 2 * this.s, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#2a2a2a';
    ctx.fill();

    // 头
    ctx.beginPath();
    ctx.arc(-3.5 * this.s, -0.5 * this.s, 2 * this.s, 0, Math.PI * 2);
    ctx.fillStyle = '#333';
    ctx.fill();

    // 红色眼睛
    ctx.beginPath();
    ctx.arc(-4.3 * this.s, -1.4 * this.s, 0.8 * this.s, 0, Math.PI * 2);
    ctx.fillStyle = '#cc2200';
    ctx.fill();

    // 腿
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 0.6 * this.s;
    for (const lx of [-1, 0, 1]) {
      ctx.beginPath();
      ctx.moveTo(lx * this.s, 1.5 * this.s);
      ctx.lineTo(lx * 2.5 * this.s, 4 * this.s);
      ctx.stroke();
    }

    ctx.restore();
  }
}

// ========== 漂浮文字 ==========
const floatingTexts = [
  { text: '💩', delay: 0, x: 70, y: -160, amp: 12, spd: 0.018, size: 28, color: '#8B5E3C' },
  { text: '好臭', delay: 15, x: -80, y: -140, amp: 10, spd: 0.022, size: 18, color: '#996644' },
  { text: 'yue~', delay: 40, x: 90, y: -80, amp: 14, spd: 0.02, size: 16, color: '#886644' },
  { text: '🤮', delay: 60, x: -95, y: -100, amp: 8, spd: 0.025, size: 24, color: '#aa7744' },
  { text: 'pang臭', delay: 80, x: 80, y: -50, amp: 11, spd: 0.019, size: 15, color: '#997755' },
  { text: '😷', delay: 100, x: -70, y: -170, amp: 9, spd: 0.023, size: 26, color: '#bb8855' },
  { text: '憋气了', delay: 120, x: 65, y: -120, amp: 13, spd: 0.017, size: 14, color: '#886655' },
];

// ========== 主绘制 ==========
function drawPoop(cx, cy, s, t) {
  const segs = getSegments();
  const bounce = Math.sin(t * 0.022) * 12 * s;
  const squash = 1 + Math.sin(t * 0.045) * 0.035;
  const stretch = 1 - Math.sin(t * 0.045) * 0.03;
  const sway = Math.sin(t * 0.018) * 0.04;

  ctx.save();
  ctx.translate(cx, cy + bounce);
  ctx.transform(squash, 0, 0, stretch, 0, 0);
  ctx.rotate(sway);

  // --- 暗面 ---
  outlinePath(ctx, segs, s, 5, -6);
  ctx.fillStyle = '#2e1508'; ctx.fill();

  // --- 中间调 ---
  outlinePath(ctx, segs, s, 2, -2);
  ctx.fillStyle = '#5c3016'; ctx.fill();

  // --- 主体 ---
  outlinePath(ctx, segs, s, 0, 0);
  const bodyGrad = ctx.createLinearGradient(-0.45 * s * 100, 0.8 * s * 100, 0.3 * s * 100, -1.6 * s * 100);
  bodyGrad.addColorStop(0, '#6b3a1a');
  bodyGrad.addColorStop(0.25, '#7d4822');
  bodyGrad.addColorStop(0.5, '#8c5530');
  bodyGrad.addColorStop(0.75, '#a0683a');
  bodyGrad.addColorStop(1, '#b88050');
  ctx.fillStyle = bodyGrad; ctx.fill();
  ctx.strokeStyle = '#3a1c0c'; ctx.lineWidth = 2.5 * s; ctx.stroke();

  // --- 纹理 ---
  ctx.save();
  outlinePath(ctx, segs, s, 0, 0); ctx.clip();
  for (const [cx, cy, rx] of segs) {
    const x = cx * s, y = cy * s, r = rx * s;
    ctx.beginPath();
    ctx.moveTo(x - r * 0.7, y);
    ctx.quadraticCurveTo(x, y + r * 0.08, x + r * 0.6, y);
    ctx.strokeStyle = 'rgba(20,5,0,0.2)'; ctx.lineWidth = 1.5 * s; ctx.stroke();
  }
  ctx.beginPath();
  ctx.moveTo(5 * s, 75 * s);
  ctx.quadraticCurveTo(10 * s, 0, -5 * s, -70 * s);
  ctx.quadraticCurveTo(-8 * s, -90 * s, -2 * s, -120 * s);
  ctx.strokeStyle = 'rgba(15,3,0,0.18)'; ctx.lineWidth = 2 * s; ctx.stroke();
  ctx.restore();

  // --- 凸起 ---
  for (let i = 0; i < 60; i++) {
    const seg = segs[Math.floor(Math.random() * segs.length)];
    const a = Math.random() * Math.PI * 2;
    const rVar = 0.5 + Math.random() * 0.7;
    const px = seg[0] * s + Math.cos(a) * seg[2] * s * rVar;
    const py = seg[1] * s + Math.sin(a) * seg[3] * s * rVar;
    ctx.beginPath();
    ctx.arc(px, py, (1 + Math.random() * 3) * s, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,240,210,${Math.random() * 0.1 + 0.02})`;
    ctx.fill();
  }

  // --- 高光 ---
  ctx.beginPath();
  ctx.ellipse(-10 * s, -30 * s, 22 * s, 55 * s, -0.2, 0, Math.PI * 2);
  const hl = ctx.createRadialGradient(-5 * s, -40 * s, 2 * s, -10 * s, -30 * s, 55 * s);
  hl.addColorStop(0, 'rgba(255,255,240,0.4)');
  hl.addColorStop(0.5, 'rgba(255,245,220,0.15)');
  hl.addColorStop(1, 'rgba(255,220,180,0)');
  ctx.fillStyle = hl; ctx.fill();

  // --- AO ---
  ctx.save();
  outlinePath(ctx, segs, s, 0, 0); ctx.clip();
  const ao = ctx.createLinearGradient(0, 30 * s, 0, 100 * s);
  ao.addColorStop(0, 'rgba(0,0,0,0)');
  ao.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = ao;
  ctx.fillRect(-100 * s, 30 * s, 200 * s, 100 * s);
  ctx.restore();

  // --- 眼睛 ---
  const eyeY = -38 * s;
  for (const ex of [-18 * s, 18 * s]) {
    ctx.beginPath(); ctx.ellipse(ex, eyeY, 12 * s, 14 * s, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fill();
    ctx.beginPath(); ctx.ellipse(ex, eyeY - 2 * s, 10 * s, 12 * s, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#fefef5'; ctx.fill();
    ctx.beginPath(); ctx.ellipse(ex + 2 * s, eyeY - 1 * s, 5 * s, 5.5 * s, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#1a0800'; ctx.fill();
    ctx.beginPath(); ctx.arc(ex + 5.5 * s, eyeY - 5 * s, 2.2 * s, 0, Math.PI * 2);
    ctx.fillStyle = '#fff'; ctx.fill();
  }

  // --- 嘴 ---
  const mouthY = -12 * s;
  const mouthOpen = 0.1 + Math.sin(t * 0.05) * 0.04;
  ctx.beginPath();
  ctx.arc(0, mouthY, 13 * s, mouthOpen, Math.PI - mouthOpen);
  ctx.strokeStyle = '#2a0e04'; ctx.lineWidth = 3 * s; ctx.stroke();

  // --- 腮红 ---
  for (const rx of [-33 * s, 33 * s]) {
    const blush = ctx.createRadialGradient(rx, eyeY + 8 * s, 0, rx, eyeY + 8 * s, 8 * s);
    blush.addColorStop(0, 'rgba(255,120,100,0.28)');
    blush.addColorStop(1, 'rgba(255,80,60,0)');
    ctx.beginPath(); ctx.ellipse(rx, eyeY + 8 * s, 8 * s, 6 * s, 0, 0, Math.PI * 2);
    ctx.fillStyle = blush; ctx.fill();
  }

  ctx.restore();
}

// === 阴影 ===
function drawShadow(cx, cy, s, t) {
  const bounce = Math.sin(t * 0.022) * 12 * s;
  const dist = Math.abs(bounce) / (12 * s);
  ctx.save();
  ctx.translate(cx, cy + 180 * s);
  const grad = ctx.createRadialGradient(0, 0, 5 * s, 0, 0, 55 * s * (1 - dist * 0.4));
  grad.addColorStop(0, `rgba(0,0,0,${0.22 * (1 - dist * 0.5)})`);
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.ellipse(0, 0, 55 * s * (1 - dist * 0.3), 14 * s * (1 - dist * 0.3), 0, 0, Math.PI * 2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.restore();
}

// === 粒子 ===
const pts = [];
for (let i = 0; i < 15; i++) {
  pts.push({ x: 0, y: -90, vy: -0.3 - Math.random() * 0.5, vx: (Math.random() - 0.5) * 0.4, life: 1, r: 2 + Math.random() * 3 });
}

// === 漂浮文字 ===
function drawFloatingText(cx, cy, s, t) {
  for (const ft of floatingTexts) {
    if (t < ft.delay) continue;
    const phase = (t - ft.delay) * ft.spd;
    const px = cx + ft.x * s;
    const py = cy + ft.y * s + Math.sin(phase) * ft.amp * s;
    const alpha = 0.5 + Math.sin(phase + 1) * 0.3;

    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(Math.sin(phase * 0.7) * 0.08);
    ctx.font = `bold ${ft.size * s}px "Microsoft YaHei", "PingFang SC", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // 光晕
    ctx.fillStyle = `rgba(255,255,255,${alpha * 0.3})`;
    ctx.fillText(ft.text, 2 * s, 2 * s);
    // 主体
    ctx.fillStyle = ft.color.replace(')', `,${alpha})`).replace('rgb', 'rgba');
    if (ft.color.startsWith('#')) {
      const r = parseInt(ft.color.slice(1, 3), 16);
      const g = parseInt(ft.color.slice(3, 5), 16);
      const b = parseInt(ft.color.slice(5, 7), 16);
      ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
    }
    ctx.fillText(ft.text, 0, 0);

    ctx.restore();
  }
}

// === 主循环 ===
let t = 0;
let flies = [];

function animate() {
  ctx.clearRect(0, 0, W, H);

  const cx = W / 2, cy = H * 0.48;
  const s = Math.min(W, H) / 550;

  // 初始化苍蝇
  if (flies.length === 0) {
    for (let i = 0; i < 3; i++) {
      flies.push(new Fly(cx, cy, s));
    }
  }

  // 粒子
  ctx.save();
  ctx.translate(cx, cy);
  for (const p of pts) {
    p.y += p.vy; p.x += p.vx; p.vy -= 0.004; p.life -= 0.005;
    if (p.life <= 0) { p.x = 0; p.y = -90 * s; p.vy = -0.3 - Math.random() * 0.5; p.life = 1; }
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * s, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(160,210,160,${p.life * 0.4})`;
    ctx.fill();
  }
  ctx.restore();

  drawShadow(cx, cy, s, t);
  drawPoop(cx, cy, s, t);

  // 漂浮文字
  drawFloatingText(cx, cy, s, t);

  // 苍蝇（画在屎上面）
  for (const fly of flies) {
    fly.update(t);
    fly.draw();
  }

  t++;
  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
